<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="공부알람">
<title>공부 알람</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

:root{
  --bg:#0e0e11;
  --bg2:#16161a;
  --bg3:#1e1e24;
  --bg4:#26262f;
  --border:#2e2e38;
  --border2:#3a3a48;
  --text:#f0f0f5;
  --text2:#a0a0b8;
  --text3:#606078;
  --accent:#5b8fff;
  --accent2:#3d6ee0;
  --accent-glow:rgba(91,143,255,0.18);
  --green:#3ecf8e;
  --green-dim:rgba(62,207,142,0.15);
  --amber:#f5a623;
  --radius:16px;
  --radius-sm:10px;
}
[data-theme="light"]{
  --bg:#f5f7fa;
  --bg2:#ffffff;
  --bg3:#f0f2f5;
  --bg4:#e5e8ee;
  --border:#e2e5ec;
  --border2:#d0d5e0;
  --text:#1a1a2e;
  --text2:#4a4a6a;
  --text3:#9090aa;
  --accent:#3a6fd8;
  --accent2:#2856b8;
  --accent-glow:rgba(58,111,216,0.15);
  --green:#1a9e6a;
  --amber:#d4880a;
}
/* 라이트 모드 nav 블러 배경 */
[data-theme="light"] .nav{background:rgba(245,247,250,0.92);}

/* 테마 토글 버튼 */
.theme-toggle{
  position:fixed;top:16px;right:16px;
  width:36px;height:36px;
  border-radius:50%;
  border:1px solid var(--border2);
  background:var(--bg3);
  color:var(--text2);
  font-size:16px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:100;
  transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.theme-toggle:hover{background:var(--bg4);color:var(--text);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);}
body{font-family:'DM Sans',-apple-system,sans-serif;}
.app{max-width:390px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.screen{display:none;flex:1;flex-direction:column;padding:1.5rem 1rem 5.5rem;}
.screen.active{display:flex;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;display:flex;background:rgba(14,14,17,0.92);border-top:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:10;}
.nav-btn{flex:1;padding:10px 0 14px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--text3);font-size:10px;font-family:inherit;transition:color .2s;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;}
.page-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:1.5rem;letter-spacing:-0.3px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:12px;}
.timer-ring-wrap{display:flex;justify-content:center;margin:0.5rem 0 1.25rem;}
.timer-label{font-size:11px;color:var(--text3);text-align:center;margin-bottom:0.5rem;letter-spacing:.8px;text-transform:uppercase;}
.timer-btns{display:flex;gap:10px;justify-content:center;margin-top:1rem;}
.timer-btns button{padding:11px 28px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .18s;}
.timer-btns button:hover{background:var(--bg4);color:var(--text);}
.timer-btns .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 22px var(--accent-glow);}
.timer-btns .btn-primary:hover{background:var(--accent2);border-color:var(--accent2);}
.mode-chips{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--text3);transition:all .18s;}
.chip:hover{border-color:var(--border2);color:var(--text2);}
.chip.active{background:var(--accent-glow);color:var(--accent);border-color:var(--accent);}
.subject-select{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px;font-family:inherit;background:var(--bg3);color:var(--text);margin-bottom:0.5rem;outline:none;transition:border-color .18s;}
.subject-select:focus{border-color:var(--accent);}
.subject-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.subject-row:last-child{border-bottom:none;}
.subject-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.subject-name{flex:1;font-size:15px;font-weight:500;color:var(--text);}
.subject-time{font-size:13px;color:var(--text3);}
.toggle{position:relative;width:42px;height:24px;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:var(--bg4);border-radius:12px;cursor:pointer;transition:.25s;border:1px solid var(--border2);}
.slider:before{content:'';position:absolute;height:18px;width:18px;left:2px;bottom:2px;background:var(--text3);border-radius:50%;transition:.25s;}
input:checked+.slider{background:var(--accent);border-color:var(--accent);}
input:checked+.slider:before{transform:translateX(18px);background:#fff;}
.add-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:transparent;font-size:14px;color:var(--text3);cursor:pointer;margin-top:8px;font-family:inherit;transition:all .18s;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}
.add-form{display:none;margin-top:12px;}
.add-form input{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px;font-family:inherit;background:var(--bg3);color:var(--text);margin-bottom:8px;outline:none;transition:border-color .18s;}
.add-form input:focus{border-color:var(--accent);}
.add-form .row{display:flex;gap:8px;}
.add-form .row button{flex:1;padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:14px;cursor:pointer;font-family:inherit;background:var(--bg3);color:var(--text2);transition:all .18s;}
.add-form .row button:hover{background:var(--bg4);}
.add-form .row .confirm{background:var(--accent);color:#fff;border-color:var(--accent);}
.add-form .row .confirm:hover{background:var(--accent2);}
.color-row{display:flex;gap:8px;margin-bottom:8px;}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.color-opt:hover{transform:scale(1.15);}
.color-opt.sel{border-color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,0.35);}
.time-input{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px;font-family:inherit;background:var(--bg3);color:var(--text);margin-bottom:8px;outline:none;transition:border-color .18s;}
.time-input:focus{border-color:var(--accent);}
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;text-align:center;}
.stat-val{font-size:26px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.4px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:13px;color:var(--text2);width:56px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-val{font-size:12px;color:var(--text3);min-width:32px;font-family:'DM Mono',monospace;}
.record-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.record-row:last-child{border-bottom:none;}
.record-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.record-name{flex:1;font-size:14px;font-weight:500;color:var(--text);}
.record-dur{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:2rem 0;}
#kr-time{color:var(--accent)!important;font-family:'DM Mono',monospace;}
#kr-date{color:var(--text3)!important;}
.card-heading{color:var(--text)!important;}
.card-sub{color:var(--text3)!important;}
#session-count{color:var(--text)!important;}
#timer-text{fill:var(--text)!important;}
#timer-phase{fill:var(--text3)!important;}
circle[stroke="#f3f4f6"]{stroke:var(--bg4)!important;}
.alarm-input{background:var(--bg3)!important;color:var(--text)!important;border-color:var(--border)!important;}
.alarm-input:focus{border-color:var(--accent)!important;outline:none;}
.alarm-cancel-btn{background:var(--bg3)!important;color:var(--text2)!important;border-color:var(--border2)!important;}
#snackbar-container{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:358px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;}
.snackbar{display:flex;align-items:center;gap:12px;background:var(--bg3);color:var(--text);padding:13px 16px;border-radius:14px;border:1px solid var(--border2);box-shadow:0 8px 32px rgba(0,0,0,0.5);pointer-events:auto;position:relative;overflow:hidden;animation:snack-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;font-size:14px;font-family:'DM Sans',-apple-system,sans-serif;}
.snackbar.hide{animation:snack-out 0.28s ease-in forwards;}
.snackbar-icon{font-size:20px;flex-shrink:0;}
.snackbar-body{flex:1;}
.snackbar-title{font-weight:600;font-size:14px;line-height:1.3;}
.snackbar-msg{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.3;}
.snackbar-close{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 0 0 4px;line-height:1;flex-shrink:0;}
.snackbar-close:hover{color:var(--text);}
.snackbar-progress{position:absolute;bottom:0;left:0;height:2px;border-radius:0 0 14px 14px;animation:snack-prog var(--dur,4s) linear forwards;}
.snackbar[data-type="focus"]{border-left:3px solid var(--accent);}
.snackbar[data-type="rest"]{border-left:3px solid var(--green);}
.snackbar[data-type="alarm"]{border-left:3px solid var(--amber);}
.snackbar[data-type="focus"] .snackbar-progress{background:var(--accent);}
.snackbar[data-type="rest"] .snackbar-progress{background:var(--green);}
.snackbar[data-type="alarm"] .snackbar-progress{background:var(--amber);}
@keyframes snack-in{from{opacity:0;transform:translateY(20px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes snack-out{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(12px) scale(0.95);}}
@keyframes snack-prog{from{width:100%;}to{width:0%;}}
</style>
</head>
<body>
<div id="snackbar-container"></div>
<button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="테마 전환">🌙</button>
<div class="app">

<div class="screen active" id="screen-timer">
  <div class="page-title">타이머</div>
  <div id="kr-clock" style="text-align:center;margin:-4px 0 10px;line-height:1.3;">
    <div id="kr-time" style="font-size:32px;font-weight:700;letter-spacing:2px;font-variant-numeric:tabular-nums;">00:00:00</div>
    <div id="kr-date" style="font-size:12px;margin-top:1px;"></div>
  </div>
  <div class="mode-chips" style="justify-content:space-between;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div class="chip active" data-mins="25" data-mode="pomodoro" data-label="집중 모드 · 25분" onclick="setMode(this)">포모도로</div>
      <div class="chip" data-mins="10" data-mode="short" data-label="단기 집중 · 10분" onclick="setMode(this)">단기 집중</div>
      <div class="chip" data-mins="110" data-mode="long" data-label="장기 집중 · 110분" onclick="setMode(this)">장기 집중</div>
    </div>
    <button onclick="showAlarmPanel()" id="alarm-chip-btn">🔔 알람</button>
  </div>

  <!-- 알람 패널 (토글) -->
  <div id="alarm-panel" style="display:none;margin-bottom:12px;">
    <div class="card" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:14px;font-weight:600;" class="card-heading">⏰ 시각 알람</div>
        <button onclick="toggleTimeAlarmForm()" style="font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;font-family:inherit;" id="ta-add-btn">+ 추가</button>
      </div>
      <div id="time-alarm-list"></div>
      <div id="time-alarm-form" style="display:none;margin-top:8px;">
        <input type="text" id="ta-label" placeholder="알람 이름 (예: 영어 공부)" style="width:100%;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;margin-bottom:8px;" class="alarm-input">
        <input type="time" id="ta-time" value="08:00" style="width:100%;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;margin-bottom:8px;" class="alarm-input">
        <div style="display:flex;gap:8px;">
          <button onclick="toggleTimeAlarmForm()" style="flex:1;padding:8px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;cursor:pointer;font-family:inherit;background:#fff;color:#1a1a1a;" class="alarm-cancel-btn">취소</button>
          <button onclick="addTimeAlarm()" style="flex:1;padding:8px;border-radius:10px;border:none;font-size:14px;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff;">추가</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:14px;font-weight:600;" class="card-heading">⏳ 카운트다운</div>
        <button onclick="toggleCdForm()" style="font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;font-family:inherit;" id="cd-add-btn">+ 추가</button>
      </div>
      <div id="countdown-alarm-list"></div>
      <div id="cd-form" style="display:none;margin-top:8px;">
        <input type="text" id="cd-label" placeholder="알람 이름 (예: 쉬는 시간)" style="width:100%;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;margin-bottom:8px;" class="alarm-input">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <input type="number" id="cd-min" min="1" max="999" value="10" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;" class="alarm-input">
          <span style="font-size:14px;color:#6b7280;">분 후</span>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="toggleCdForm()" style="flex:1;padding:8px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;cursor:pointer;font-family:inherit;background:#fff;color:#1a1a1a;" class="alarm-cancel-btn">취소</button>
          <button onclick="addCountdownAlarm()" style="flex:1;padding:8px;border-radius:10px;border:none;font-size:14px;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff;">시작</button>
        </div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);padding:0 4px;margin-bottom:4px;">브라우저가 열려있을 때 소리가 울려요.</div>
  </div>
  <div class="card">
    <div class="timer-label" id="timer-mode-label">집중 모드 · 25분</div>
    <div class="timer-ring-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="88" fill="none" stroke="#f3f4f6" stroke-width="10"/>
        <circle id="ring" cx="100" cy="100" r="88" fill="none" stroke="var(--accent)" stroke-width="10"
          stroke-dasharray="553" stroke-dashoffset="0"
          stroke-linecap="round" transform="rotate(-90 100 100)"/>
        <text x="100" y="95" text-anchor="middle" font-size="42" font-weight="600" fill="var(--text)" font-family="-apple-system,sans-serif" id="timer-text" style="fill:var(--text);">25:00</text>
        <text x="100" y="120" text-anchor="middle" font-size="13" font-family="-apple-system,sans-serif" id="timer-phase" style="fill:var(--text3);">집중</text>
      </svg>
    </div>
    <select class="subject-select" id="timer-subject-sel">
      <option value="">과목 선택 (선택사항)</option>
    </select>
    <div class="timer-btns">
      <button onclick="resetTimer()">초기화</button>
      <button class="btn-primary" id="start-btn" onclick="toggleTimer()">시작</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="playAlarm('focus')" style="flex:1;padding:7px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .18s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">📚 집중</button>
      <button onclick="playAlarm('rest')" style="flex:1;padding:7px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .18s;" onmouseover="this.style.borderColor='var(--green)'" onmouseout="this.style.borderColor='var(--border2)'">☕ 휴식</button>
      <button onclick="playAlarm('alarm')" style="flex:1;padding:7px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .18s;" onmouseover="this.style.borderColor='var(--amber)'" onmouseout="this.style.borderColor='var(--border2)'">⏰ 알람</button>
    </div>
  </div>
  <div class="card" style="text-align:center;">
    <div style="font-size:13px;" class="card-sub">오늘 완료한 세션</div>
    <div style="font-size:28px;font-weight:600;margin-top:4px;" id="session-count">0</div>
  </div>
</div>

<div class="screen" id="screen-subjects">
  <div class="page-title">과목 알람</div>
  <div class="card">
    <div id="subject-list"></div>
    <button class="add-btn" onclick="toggleAddForm()">+ 과목 추가</button>
    <div class="add-form" id="add-form">
      <input type="text" id="new-subject-name" placeholder="과목 이름 (예: 수학, 영어)">
      <input type="time" class="time-input" id="new-alarm-time" value="08:00">
      <div class="color-row" id="color-row"></div>
      <div class="row">
        <button onclick="toggleAddForm()">취소</button>
        <button class="confirm" onclick="addSubject()">추가</button>
      </div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--text3);padding:0 4px;">알람은 브라우저 알림으로 전송돼요. 알림 허용이 필요해요.</div>
</div>

<div class="screen" id="screen-stats">
  <div class="page-title">통계</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" id="today-min">0</div><div class="stat-lbl">오늘 공부 (분)</div></div>
    <div class="stat-card"><div class="stat-val" id="today-sess">0</div><div class="stat-lbl">완료 세션</div></div>
    <div class="stat-card"><div class="stat-val" id="total-min">0</div><div class="stat-lbl">누적 공부 (분)</div></div>
    <div class="stat-card"><div class="stat-val" id="total-sess">0</div><div class="stat-lbl">누적 세션</div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;" class="card-heading">과목별 누적</div>
    <div id="subject-bars"><div class="empty">아직 기록이 없어요</div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;" class="card-heading">최근 기록</div>
    <div id="records-list"><div class="empty">아직 기록이 없어요</div></div>
  </div>
</div>

</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('timer',this)"><span class="nav-icon">⏱</span>타이머</button>
  <button class="nav-btn" onclick="showScreen('subjects',this)"><span class="nav-icon">📚</span>과목</button>
  <button class="nav-btn" onclick="showScreen('stats',this)"><span class="nav-icon">📊</span>통계</button>
</nav>

<script>
var COLORS=['#185FA5','#0F6E56','#993C1D','#993556','#3B6D11','#854F0B'];
var selColor=COLORS[0];
var subjects=JSON.parse(localStorage.getItem('subjects')||'[]');
var records=JSON.parse(localStorage.getItem('records')||'[]');
var sessionCount=parseInt(localStorage.getItem('sessionCount')||'0');
var currentMins=25;
var currentMode='pomodoro'; // pomodoro | short | long
var longPhase=0; // 0=첫번째집중 1=휴식 2=두번째집중
var totalSecs=25*60;
var leftSecs=25*60;
var isRunning=false;
var isBreak=false;
var studySecs=0;
var endTime=null;
var timerId=null;

// 한국 시간 시계
function updateKRClock(){
  var now=new Date();
  var kr=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  var h=String(kr.getHours()).padStart(2,'0');
  var m=String(kr.getMinutes()).padStart(2,'0');
  var s=String(kr.getSeconds()).padStart(2,'0');
  document.getElementById('kr-time').textContent=h+':'+m+':'+s;
  var days=['일','월','화','수','목','금','토'];
  var dateStr=(kr.getMonth()+1)+'월 '+kr.getDate()+'일 ('+days[kr.getDay()]+')';
  document.getElementById('kr-date').textContent='🇰🇷 한국 시간 · '+dateStr;
}
updateKRClock();
setInterval(updateKRClock,1000);

function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='stats')renderStats();
}

function setMode(el){
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  currentMins=parseInt(el.getAttribute('data-mins'));
  currentMode=el.getAttribute('data-mode')||'pomodoro';
  longPhase=0;
  document.getElementById('timer-mode-label').textContent=el.getAttribute('data-label');
  resetTimer();
}

function showAlarmPanel(){
  var p=document.getElementById('alarm-panel');
  var btn=document.getElementById('alarm-chip-btn');
  var open=p.style.display==='block';
  p.style.display=open?'none':'block';
  btn.classList.toggle('open',!open);
  if(!open){renderAlarms();applyAlarmInputDark();}
}

function toggleTimer(){
  if(isRunning){pauseTimer();}else{startTimer();}
}

function startTimer(){
  isRunning=true;
  document.getElementById('start-btn').textContent='일시정지';
  if(typeof Notification!=='undefined'&&Notification.permission==='default'){
    Notification.requestPermission();
  }
  endTime=Date.now()+(leftSecs*1000);
  clearInterval(timerId);
  timerId=setInterval(function(){
    var now=Date.now();
    var remaining=Math.ceil((endTime-now)/1000);
    if(remaining<=0){
      clearInterval(timerId);
      leftSecs=0;
      if(!isBreak)studySecs=totalSecs;
      updateDisplay();
      onTimerEnd();
      return;
    }
    leftSecs=remaining;
    if(!isBreak)studySecs=totalSecs-leftSecs;
    updateDisplay();
  },500);
}

function onTimerEnd(){
  isRunning=false;
  document.getElementById('start-btn').textContent='시작';

  if(currentMode==='long'){
    // 장기집중: phase 0=50분집중 → 1=5분휴식 → 2=50분집중 → 완료
    if(longPhase===0){
      // 첫 50분 집중 완료 → 5분 휴식
      studySecs+=50*60;
      sendNotif('휴식 시간!','50분 집중 완료! 5분 쉬어가세요','focus');
      longPhase=1;
      isBreak=true;
      totalSecs=5*60;leftSecs=5*60;
      document.getElementById('timer-phase').textContent='휴식 (5분)';
      document.getElementById('ring').setAttribute('stroke','var(--green)');
      updateDisplay();
      startTimer();
    } else if(longPhase===1){
      // 5분 휴식 완료 → 두번째 50분 집중
      sendNotif('다시 집중!','휴식 끝! 50분 더 집중해요','rest');
      longPhase=2;
      isBreak=false;
      totalSecs=50*60;leftSecs=totalSecs;
      document.getElementById('timer-phase').textContent='집중 (2/2)';
      document.getElementById('ring').setAttribute('stroke','var(--accent)');
      updateDisplay();
      startTimer();
    } else {
      // 두번째 50분 완료 → 장기집중 전체 완료
      studySecs+=50*60;
      sessionCount++;
      localStorage.setItem('sessionCount',sessionCount);
      var subj=document.getElementById('timer-subject-sel').value||'기타';
      var rec={id:Date.now(),subjectName:subj,duration:studySecs,date:new Date().toISOString()};
      records.push(rec);
      localStorage.setItem('records',JSON.stringify(records));
      studySecs=0;
      longPhase=0;
      sendNotif('장기 집중 완료!','110분 집중 완료! 충분히 쉬어가세요 🎉','focus');
      document.getElementById('timer-phase').textContent='완료!';
      updateDisplay();
    }
    return;
  }

  // 포모도로 / 단기집중 기존 로직
  if(!isBreak){
    sessionCount++;
    localStorage.setItem('sessionCount',sessionCount);
    var subj=document.getElementById('timer-subject-sel').value||'기타';
    var rec={id:Date.now(),subjectName:subj,duration:studySecs,date:new Date().toISOString()};
    records.push(rec);
    localStorage.setItem('records',JSON.stringify(records));
    studySecs=0;
    sendNotif('휴식 시간!','집중 완료! 5분 쉬어가세요','focus');
    isBreak=true;
    totalSecs=5*60;leftSecs=5*60;
    document.getElementById('timer-phase').textContent='휴식';
    document.getElementById('ring').setAttribute('stroke','var(--green)');
    updateDisplay();
    startTimer();
  } else {
    sendNotif('공부 시작!','휴식 끝! 다시 집중해요','rest');
    isBreak=false;
    totalSecs=currentMins*60;leftSecs=totalSecs;
    document.getElementById('timer-phase').textContent='집중';
    document.getElementById('ring').setAttribute('stroke','var(--accent)');
    updateDisplay();
  }
}

function pauseTimer(){
  clearInterval(timerId);
  isRunning=false;
  document.getElementById('start-btn').textContent='계속';
}

function resetTimer(){
  clearInterval(timerId);
  isRunning=false;isBreak=false;studySecs=0;longPhase=0;
  var secs=(currentMode==='long')?50*60:currentMins*60;
  totalSecs=secs;leftSecs=secs;
  document.getElementById('start-btn').textContent='시작';
  document.getElementById('timer-phase').textContent=currentMode==='long'?'집중 (1/2)':'집중';
  document.getElementById('ring').setAttribute('stroke','var(--accent)');
  updateDisplay();
}

function updateDisplay(){
  var circ=2*Math.PI*88;
  var offset=circ*(1-leftSecs/totalSecs);
  document.getElementById('ring').style.strokeDashoffset=offset;
  var m=Math.floor(leftSecs/60).toString().padStart(2,'0');
  var s=(leftSecs%60).toString().padStart(2,'0');
  document.getElementById('timer-text').textContent=m+':'+s;
  document.getElementById('session-count').textContent=sessionCount;
}

function playAlarm(type){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var patterns={
      focus:[{f:880,t:0,d:0.15},{f:880,t:0.18,d:0.15},{f:1108,t:0.36,d:0.3}],
      rest:[{f:660,t:0,d:0.2},{f:528,t:0.25,d:0.4}],
      alarm:[{f:740,t:0,d:0.15},{f:740,t:0.18,d:0.15},{f:740,t:0.36,d:0.15},{f:988,t:0.54,d:0.35}]
    };
    var notes=patterns[type]||patterns.alarm;
    notes.forEach(function(n){
      var osc=ctx.createOscillator();
      var gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=n.f;osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+n.t);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+n.t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+n.t+n.d);
      osc.start(ctx.currentTime+n.t);
      osc.stop(ctx.currentTime+n.t+n.d+0.05);
    });
  }catch(e){}
}

function sendNotif(title,body,sound){
  playAlarm(sound||'alarm');
  showSnackbar(title,body,sound||'alarm');
  if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
    try{new Notification(title,{body:body});}catch(e){}
  }
}

var SNACK_ICONS={focus:'📚',rest:'☕',alarm:'⏰'};
var SNACK_DUR=4000;

function showSnackbar(title,msg,type){
  var container=document.getElementById('snackbar-container');
  var bar=document.createElement('div');
  bar.className='snackbar';
  bar.setAttribute('data-type',type||'alarm');
  bar.style.position='relative';
  bar.style.overflow='hidden';
  var icon=SNACK_ICONS[type]||'🔔';
  var dur=(SNACK_DUR/1000)+'s';
  bar.innerHTML=
    '<span class="snackbar-icon">'+icon+'</span>'
    +'<div class="snackbar-body">'
      +'<div class="snackbar-title">'+title+'</div>'
      +(msg?'<div class="snackbar-msg">'+msg+'</div>':'')
    +'</div>'
    +'<button class="snackbar-close" onclick="dismissSnack(this.parentNode)">✕</button>'
    +'<div class="snackbar-progress" style="--dur:'+dur+'"></div>';
  container.appendChild(bar);
  setTimeout(function(){dismissSnack(bar);},SNACK_DUR);
}

function dismissSnack(bar){
  if(!bar||bar._dismissing)return;
  bar._dismissing=true;
  bar.classList.add('hide');
  setTimeout(function(){if(bar.parentNode)bar.parentNode.removeChild(bar);},300);
}

function toggleAddForm(){
  var f=document.getElementById('add-form');
  f.style.display=f.style.display==='block'?'none':'block';
}

function buildColorRow(){
  var row=document.getElementById('color-row');row.innerHTML='';
  COLORS.forEach(function(c){
    var d=document.createElement('div');
    d.className='color-opt'+(c===selColor?' sel':'');
    d.style.background=c;
    d.onclick=function(){selColor=c;buildColorRow();};
    row.appendChild(d);
  });
}

function renderSubjects(){
  var list=document.getElementById('subject-list');
  var sel=document.getElementById('timer-subject-sel');
  sel.innerHTML='<option value="">과목 선택 (선택사항)</option>';
  if(subjects.length===0){list.innerHTML='<div class="empty">과목을 추가해보세요</div>';return;}
  list.innerHTML='';
  subjects.forEach(function(s,i){
    var row=document.createElement('div');row.className='subject-row';
    row.innerHTML='<div class="subject-dot" style="background:'+s.color+'"></div>'
      +'<div class="subject-name">'+s.name+'</div>'
      +'<div class="subject-time">'+(s.alarmTime||'')+'</div>'
      +'<label class="toggle"><input type="checkbox"'+(s.enabled?' checked':'')
      +' onchange="toggleAlarm('+i+',this.checked)"><span class="slider"></span></label>';
    list.appendChild(row);
    var opt=document.createElement('option');opt.value=s.name;opt.textContent=s.name;
    sel.appendChild(opt);
  });
}

function addSubject(){
  var name=document.getElementById('new-subject-name').value.trim();
  if(!name)return;
  var time=document.getElementById('new-alarm-time').value;
  subjects.push({name:name,color:selColor,alarmTime:time,enabled:false});
  localStorage.setItem('subjects',JSON.stringify(subjects));
  renderSubjects();
  document.getElementById('new-subject-name').value='';
  document.getElementById('add-form').style.display='none';
}

function toggleAlarm(i,enabled){
  subjects[i].enabled=enabled;
  localStorage.setItem('subjects',JSON.stringify(subjects));
  if(enabled&&typeof Notification!=='undefined'&&Notification.permission!=='granted'){
    Notification.requestPermission();
  }
  if(enabled&&subjects[i].alarmTime)scheduleAlarm(subjects[i]);
}

function scheduleAlarm(s){
  var parts=s.alarmTime.split(':');
  var h=parseInt(parts[0]),m=parseInt(parts[1]);
  var now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  setTimeout(function(){sendNotif('공부 시간!',s.name+' 공부를 시작할 시간이에요.','alarm');},target-now);
}

function renderStats(){
  var today=new Date().toDateString();
  var todayRecs=records.filter(function(r){return new Date(r.date).toDateString()===today;});
  var todayMin=Math.round(todayRecs.reduce(function(a,r){return a+r.duration;},0)/60);
  var totalMin=Math.round(records.reduce(function(a,r){return a+r.duration;},0)/60);
  document.getElementById('today-min').textContent=todayMin;
  document.getElementById('today-sess').textContent=todayRecs.length;
  document.getElementById('total-min').textContent=totalMin;
  document.getElementById('total-sess').textContent=records.length;
  var bySubject={};
  records.forEach(function(r){bySubject[r.subjectName]=(bySubject[r.subjectName]||0)+r.duration;});
  var bars=document.getElementById('subject-bars');
  var entries=Object.entries(bySubject).sort(function(a,b){return b[1]-a[1];});
  if(entries.length===0){bars.innerHTML='<div class="empty">아직 기록이 없어요</div>';}
  else{
    var max=entries[0][1];
    bars.innerHTML=entries.map(function(e){
      var name=e[0],dur=e[1];
      var min=Math.round(dur/60),pct=Math.round(dur/max*100);
      var subj=subjects.find(function(s){return s.name===name;});
      var color=subj?subj.color:'#185FA5';
      return '<div class="bar-row"><div class="bar-label">'+name+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'
        +'<div class="bar-val">'+min+'분</div></div>';
    }).join('');
  }
  var recList=document.getElementById('records-list');
  var recent=records.slice().reverse().slice(0,8);
  if(recent.length===0){recList.innerHTML='<div class="empty">아직 기록이 없어요</div>';}
  else{
    recList.innerHTML=recent.map(function(r){
      var min=Math.round(r.duration/60);
      var subj=subjects.find(function(s){return s.name===r.subjectName;});
      var color=subj?subj.color:'#185FA5';
      var date=new Date(r.date);
      var label=(date.getMonth()+1)+'/'+date.getDate()+' '+date.getHours()+':'+(date.getMinutes().toString().padStart(2,'0'));
      return '<div class="record-row"><div class="record-dot" style="background:'+color+'"></div>'
        +'<div class="record-name">'+r.subjectName+'</div>'
        +'<div class="record-dur">'+min+'분 · '+label+'</div></div>';
    }).join('');
  }
}

// ===== 알람 탭 =====
var timeAlarms=JSON.parse(localStorage.getItem('timeAlarms')||'[]');
var countdownAlarms=JSON.parse(localStorage.getItem('countdownAlarms')||'[]');
var alarmTimers={};

function toggleTimeAlarmForm(){
  var f=document.getElementById('time-alarm-form');
  f.style.display=f.style.display==='block'?'none':'block';
}
function toggleCdForm(){
  var f=document.getElementById('cd-form');
  f.style.display=f.style.display==='block'?'none':'block';
}

function addTimeAlarm(){
  var label=document.getElementById('ta-label').value.trim()||'알람';
  var time=document.getElementById('ta-time').value;
  if(!time)return;
  var alarm={id:Date.now(),label:label,time:time,enabled:true};
  timeAlarms.push(alarm);
  localStorage.setItem('timeAlarms',JSON.stringify(timeAlarms));
  document.getElementById('ta-label').value='';
  document.getElementById('time-alarm-form').style.display='none';
  scheduleTimeAlarm(alarm);
  renderAlarms();
}

function scheduleTimeAlarm(alarm){
  if(alarmTimers['t'+alarm.id])clearTimeout(alarmTimers['t'+alarm.id]);
  if(!alarm.enabled)return;
  var parts=alarm.time.split(':');
  var h=parseInt(parts[0]),m=parseInt(parts[1]);
  var now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  var diff=target-now;
  alarmTimers['t'+alarm.id]=setTimeout(function(){
    sendNotif('⏰ '+alarm.label, alarm.time+' 알람이에요!','alarm');
    // 다음날 재예약
    var idx=timeAlarms.findIndex(function(a){return a.id===alarm.id;});
    if(idx>=0&&timeAlarms[idx].enabled)scheduleTimeAlarm(timeAlarms[idx]);
    renderAlarms();
  },diff);
}

function addCountdownAlarm(){
  var label=document.getElementById('cd-label').value.trim()||'카운트다운';
  var mins=parseInt(document.getElementById('cd-min').value)||10;
  var alarm={id:Date.now(),label:label,mins:mins,endAt:Date.now()+mins*60000,active:true};
  countdownAlarms.push(alarm);
  localStorage.setItem('countdownAlarms',JSON.stringify(countdownAlarms));
  document.getElementById('cd-label').value='';
  document.getElementById('cd-min').value='10';
  document.getElementById('cd-form').style.display='none';
  startCountdown(alarm);
  renderAlarms();
}

function startCountdown(alarm){
  if(alarmTimers['c'+alarm.id])clearTimeout(alarmTimers['c'+alarm.id]);
  var remaining=alarm.endAt-Date.now();
  if(remaining<=0)return;
  alarmTimers['c'+alarm.id]=setTimeout(function(){
    sendNotif('⏳ '+alarm.label, alarm.mins+'분 카운트다운 완료!','focus');
    var idx=countdownAlarms.findIndex(function(a){return a.id===alarm.id;});
    if(idx>=0){countdownAlarms[idx].active=false;localStorage.setItem('countdownAlarms',JSON.stringify(countdownAlarms));}
    renderAlarms();
  },remaining);
  // 1초마다 화면 갱신
  alarmTimers['c'+alarm.id+'_tick']=setInterval(function(){
    var idx=countdownAlarms.findIndex(function(a){return a.id===alarm.id;});
    if(idx<0||!countdownAlarms[idx].active){clearInterval(alarmTimers['c'+alarm.id+'_tick']);return;}
    renderAlarms();
  },1000);
}

function deleteTimeAlarm(id){
  if(alarmTimers['t'+id])clearTimeout(alarmTimers['t'+id]);
  timeAlarms=timeAlarms.filter(function(a){return a.id!==id;});
  localStorage.setItem('timeAlarms',JSON.stringify(timeAlarms));
  renderAlarms();
}

function deleteCountdownAlarm(id){
  if(alarmTimers['c'+id])clearTimeout(alarmTimers['c'+id]);
  if(alarmTimers['c'+id+'_tick'])clearInterval(alarmTimers['c'+id+'_tick']);
  countdownAlarms=countdownAlarms.filter(function(a){return a.id!==id;});
  localStorage.setItem('countdownAlarms',JSON.stringify(countdownAlarms));
  renderAlarms();
}

function toggleTimeAlarmEnabled(id,enabled){
  var idx=timeAlarms.findIndex(function(a){return a.id===id;});
  if(idx<0)return;
  timeAlarms[idx].enabled=enabled;
  localStorage.setItem('timeAlarms',JSON.stringify(timeAlarms));
  if(enabled){
    if(typeof Notification!=='undefined'&&Notification.permission!=='granted')Notification.requestPermission();
    scheduleTimeAlarm(timeAlarms[idx]);
  } else {
    if(alarmTimers['t'+id])clearTimeout(alarmTimers['t'+id]);
  }
}

function formatCountdown(endAt){
  var diff=Math.max(0,Math.ceil((endAt-Date.now())/1000));
  var m=Math.floor(diff/60).toString().padStart(2,'0');
  var s=(diff%60).toString().padStart(2,'0');
  return m+':'+s;
}

function renderAlarms(){
  // 시각 알람
  var taList=document.getElementById('time-alarm-list');
  if(!taList)return;
  if(timeAlarms.length===0){taList.innerHTML='<div class="empty" style="padding:1rem 0;">아직 알람이 없어요</div>';}
  else{
    taList.innerHTML=timeAlarms.map(function(a){
      return '<div class="subject-row">'
        +'<div style="font-size:18px;font-weight:700;color:var(--accent);min-width:52px;font-family:DM Mono,monospace;">'+a.time+'</div>'
        +'<div class="subject-name">'+a.label+'</div>'
        +'<label class="toggle"><input type="checkbox"'+(a.enabled?' checked':'')+' onchange="toggleTimeAlarmEnabled('+a.id+',this.checked)"><span class="slider"></span></label>'
        +'<button onclick="deleteTimeAlarm('+a.id+')" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3);padding:0 4px;">✕</button>'
        +'</div>';
    }).join('');
  }
  // 카운트다운 알람
  var cdList=document.getElementById('countdown-alarm-list');
  if(!cdList)return;
  var active=countdownAlarms.filter(function(a){return a.active;});
  if(active.length===0){cdList.innerHTML='<div class="empty" style="padding:1rem 0;">진행 중인 카운트다운 없음</div>';}
  else{
    cdList.innerHTML=active.map(function(a){
      return '<div class="subject-row">'
        +'<div style="font-size:18px;font-weight:700;color:var(--green);min-width:52px;font-family:DM Mono,monospace;">'+formatCountdown(a.endAt)+'</div>'
        +'<div class="subject-name">'+a.label+' ('+a.mins+'분)</div>'
        +'<button onclick="deleteCountdownAlarm('+a.id+')" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3);padding:0 4px;">✕</button>'
        +'</div>';
    }).join('');
  }
}

// 다크모드 알람 입력 스타일
function applyAlarmInputDark(){
  var dark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  document.querySelectorAll('.alarm-input').forEach(function(el){
    el.style.background=dark?'#3a3a3c':'#fff';
    el.style.color=dark?'#f2f2f7':'#1a1a1a';
    el.style.borderColor=dark?'#48484a':'#e5e7eb';
  });
  document.querySelectorAll('.alarm-cancel-btn').forEach(function(el){
    el.style.background=dark?'#3a3a3c':'#fff';
    el.style.color=dark?'#f2f2f7':'#1a1a1a';
    el.style.borderColor=dark?'#48484a':'#e5e7eb';
  });
}
if(window.matchMedia)window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',applyAlarmInputDark);

// 저장된 시각 알람 재예약
timeAlarms.forEach(function(a){if(a.enabled)scheduleTimeAlarm(a);});
// 저장된 카운트다운 중 아직 유효한 것 재시작
countdownAlarms.forEach(function(a){if(a.active&&a.endAt>Date.now())startCountdown(a);else if(a.active){a.active=false;}});
localStorage.setItem('countdownAlarms',JSON.stringify(countdownAlarms));

buildColorRow();
renderSubjects();
updateDisplay();
renderAlarms();

// 테마 토글
var savedTheme = localStorage.getItem('theme') || 'dark';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', t);
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
applyTheme(savedTheme);
</script>
</body>
</html>
