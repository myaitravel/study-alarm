<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="공부알람">
<title>공부 알람</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#1a1a1a;}
.app{max-width:390px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#fff;}
.screen{display:none;flex:1;flex-direction:column;padding:1.5rem 1rem 5rem;}
.screen.active{display:flex;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;display:flex;background:#fff;border-top:1px solid #e5e7eb;z-index:10;}
.nav-btn{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:#9ca3af;font-size:10px;font-family:inherit;}
.nav-btn.active{color:#185FA5;}
.nav-icon{font-size:20px;}
.page-title{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:1.5rem;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:1rem 1.25rem;margin-bottom:12px;}

/* Timer */
.timer-ring-wrap{display:flex;justify-content:center;margin:1rem 0 1.5rem;}
.timer-label{font-size:13px;color:#6b7280;text-align:center;margin-bottom:0.5rem;}
.timer-btns{display:flex;gap:12px;justify-content:center;margin-top:1rem;}
.timer-btns button{padding:10px 28px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;font-size:15px;font-family:inherit;cursor:pointer;color:#1a1a1a;}
.timer-btns .btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;}
.mode-chips{display:flex;gap:8px;margin-bottom:1rem;}
.chip{padding:6px 14px;border-radius:20px;border:1px solid #e5e7eb;font-size:13px;cursor:pointer;background:#f9fafb;color:#6b7280;}
.chip.active{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4;}
.subject-select{width:100%;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;margin-bottom:0.5rem;}

/* Subjects */
.subject-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f3f4f6;}
.subject-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.subject-name{flex:1;font-size:15px;color:#1a1a1a;}
.subject-time{font-size:13px;color:#6b7280;}
.toggle{position:relative;width:40px;height:22px;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#d1d5db;border-radius:11px;cursor:pointer;transition:.3s;}
.slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
input:checked+.slider{background:#185FA5;}
input:checked+.slider:before{transform:translateX(18px);}
.add-btn{width:100%;padding:10px;border-radius:10px;border:1px dashed #d1d5db;background:transparent;font-size:14px;color:#6b7280;cursor:pointer;margin-top:8px;font-family:inherit;}
.add-form{display:none;margin-top:12px;}
.add-form input{width:100%;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;margin-bottom:8px;}
.add-form .row{display:flex;gap:8px;}
.add-form .row button{flex:1;padding:8px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;cursor:pointer;font-family:inherit;background:#fff;color:#1a1a1a;}
.add-form .row .confirm{background:#185FA5;color:#fff;border-color:#185FA5;}
.color-row{display:flex;gap:8px;margin-bottom:8px;}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-opt.sel{border-color:#1a1a1a;}
.time-input{width:100%;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;margin-bottom:8px;}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1rem;}
.stat-card{background:#f9fafb;border-radius:10px;padding:1rem;text-align:center;}
.stat-val{font-size:24px;font-weight:600;color:#1a1a1a;}
.stat-lbl{font-size:12px;color:#6b7280;margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:13px;color:#6b7280;width:56px;text-align:right;}
.bar-track{flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.bar-val{font-size:12px;color:#6b7280;min-width:32px;}
.record-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;}
.record-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.record-name{flex:1;font-size:14px;color:#1a1a1a;}
.record-dur{font-size:13px;color:#6b7280;}
.empty{text-align:center;color:#9ca3af;font-size:14px;padding:2rem 0;}

@media (prefers-color-scheme: dark){
  body{background:#1c1c1e;color:#fff;}
  .app{background:#1c1c1e;}
  .nav{background:#2c2c2e;border-color:#3a3a3c;}
  .card{background:#2c2c2e;border-color:#3a3a3c;}
  .chip{background:#3a3a3c;border-color:#3a3a3c;color:#9ca3af;}
  .chip.active{background:#0c447c;color:#64B5F6;border-color:#185FA5;}
  .subject-select,.add-form input,.time-input{background:#2c2c2e;border-color:#3a3a3c;color:#fff;}
  .subject-row{border-color:#3a3a3c;}
  .stat-card{background:#2c2c2e;}
  .stat-val,.page-title,.record-name,.subject-name{color:#fff;}
  .bar-track{background:#3a3a3c;}
  .add-btn{border-color:#3a3a3c;color:#9ca3af;}
  .add-form .row button{background:#2c2c2e;border-color:#3a3a3c;color:#fff;}
  .timer-btns button{background:#2c2c2e;border-color:#3a3a3c;color:#fff;}
  .record-row{border-color:#3a3a3c;}
}
</style>
</head>
<body>
<div class="app">

<div class="screen active" id="screen-timer">
  <div class="page-title">타이머</div>
  <div class="mode-chips">
    <div class="chip active" onclick="setMode('pomodoro',25,'집중 모드 · 25분',event)">포모도로</div>
    <div class="chip" onclick="setMode('short',10,'단기 집중 · 10분',event)">단기 집중</div>
    <div class="chip" onclick="setMode('long',50,'장기 집중 · 50분',event)">장기 집중</div>
  </div>
  <div class="card">
    <div class="timer-label" id="timer-mode-label">집중 모드 · 25분</div>
    <div class="timer-ring-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="88" fill="none" stroke="#f3f4f6" stroke-width="10"/>
        <circle id="ring" cx="100" cy="100" r="88" fill="none" stroke="#185FA5" stroke-width="10"
          stroke-dasharray="553" stroke-dashoffset="0"
          stroke-linecap="round" transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 1s linear;"/>
        <text x="100" y="95" text-anchor="middle" font-size="42" font-weight="600" fill="#1a1a1a" font-family="-apple-system,sans-serif" id="timer-text">25:00</text>
        <text x="100" y="120" text-anchor="middle" font-size="13" fill="#6b7280" font-family="-apple-system,sans-serif" id="timer-phase">집중</text>
      </svg>
    </div>
    <select class="subject-select" id="timer-subject-sel">
      <option value="">과목 선택 (선택사항)</option>
    </select>
    <div class="timer-btns">
      <button onclick="resetTimer()">초기화</button>
      <button class="btn-primary" id="start-btn" onclick="toggleTimer()">시작</button>
    </div>
  </div>
  <div class="card" style="text-align:center;">
    <div style="font-size:13px;color:#6b7280;">오늘 완료한 세션</div>
    <div style="font-size:28px;font-weight:600;color:#1a1a1a;margin-top:4px;" id="session-count">0</div>
  </div>
</div>

<div class="screen" id="screen-subjects">
  <div class="page-title">과목 알람</div>
  <div class="card">
    <div id="subject-list"></div>
    <button class="add-btn" onclick="toggleAddForm()">+ 과목 추가</button>
    <div class="add-form" id="add-form">
      <input type="text" id="new-subject-name" placeholder="과목 이름 (예: 수학, 영어)">
      <input type="time" class="time-input" id="new-alarm-time" value="08:00">
      <div class="color-row" id="color-row"></div>
      <div class="row">
        <button onclick="toggleAddForm()">취소</button>
        <button class="confirm" onclick="addSubject()">추가</button>
      </div>
    </div>
  </div>
  <div style="font-size:12px;color:#9ca3af;padding:0 4px;">
    알람은 브라우저 알림으로 전송돼요. 알림 허용이 필요해요.
  </div>
</div>

<div class="screen" id="screen-stats">
  <div class="page-title">통계</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" id="today-min">0</div><div class="stat-lbl">오늘 공부 (분)</div></div>
    <div class="stat-card"><div class="stat-val" id="today-sess">0</div><div class="stat-lbl">완료 세션</div></div>
    <div class="stat-card"><div class="stat-val" id="total-min">0</div><div class="stat-lbl">누적 공부 (분)</div></div>
    <div class="stat-card"><div class="stat-val" id="total-sess">0</div><div class="stat-lbl">누적 세션</div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:12px;">과목별 누적</div>
    <div id="subject-bars"><div class="empty">아직 기록이 없어요</div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:12px;">최근 기록</div>
    <div id="records-list"><div class="empty">아직 기록이 없어요</div></div>
  </div>
</div>

</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('timer',this)">
    <span class="nav-icon">⏱</span>타이머
  </button>
  <button class="nav-btn" onclick="showScreen('subjects',this)">
    <span class="nav-icon">📚</span>과목
  </button>
  <button class="nav-btn" onclick="showScreen('stats',this)">
    <span class="nav-icon">📊</span>통계
  </button>
</nav>

<script>
const COLORS=['#185FA5','#0F6E56','#993C1D','#993556','#3B6D11','#854F0B'];
let selColor=COLORS[0];
let subjects=JSON.parse(localStorage.getItem('subjects')||'[]');
let records=JSON.parse(localStorage.getItem('records')||'[]');
let timerInterval=null;
let totalSecs=25*60;
let leftSecs=25*60;
let isRunning=false;
let isBreak=false;
let sessionCount=parseInt(localStorage.getItem('sessionCount')||'0');
let studySecs=0;
let currentMode='pomodoro';

function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='stats')renderStats();
}

function setMode(mode,mins,label,e){
  currentMode=mode;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('timer-mode-label').textContent=label;
  resetTimer();
  totalSecs=mins*60;leftSecs=totalSecs;
  updateRing();updateTimerText();
}

function toggleTimer(){isRunning?pauseTimer():startTimer();}

function startTimer(){
  isRunning=true;
  document.getElementById('start-btn').textContent='일시정지';
  if(Notification.permission==='default')Notification.requestPermission();
  timerInterval=setInterval(()=>{
    if(leftSecs>0){
      leftSecs--;
      if(!isBreak)studySecs++;
      updateRing();updateTimerText();
    } else {
      clearInterval(timerInterval);
      isRunning=false;
      document.getElementById('start-btn').textContent='시작';
      if(!isBreak){
        sessionCount++;
        localStorage.setItem('sessionCount',sessionCount);
        const subj=document.getElementById('timer-subject-sel').value||'기타';
        const rec={id:Date.now(),subjectName:subj,duration:studySecs,date:new Date().toISOString()};
        records.push(rec);
        localStorage.setItem('records',JSON.stringify(records));
        studySecs=0;
        sendNotif('휴식 시간!','집중 완료! 5분 쉬어가세요 ☕');
        isBreak=true;totalSecs=5*60;leftSecs=5*60;
        document.getElementById('timer-phase').textContent='휴식';
        updateRing();updateTimerText();startTimer();
      } else {
        sendNotif('공부 시작!','휴식 끝! 다시 집중해요 💪');
        isBreak=false;
        const mins=currentMode==='short'?10:currentMode==='long'?50:25;
        totalSecs=mins*60;leftSecs=totalSecs;
        document.getElementById('timer-phase').textContent='집중';
        updateRing();updateTimerText();
      }
    }
  },1000);
}

function pauseTimer(){clearInterval(timerInterval);isRunning=false;document.getElementById('start-btn').textContent='계속';}

function resetTimer(){
  clearInterval(timerInterval);isRunning=false;isBreak=false;studySecs=0;
  const mins=currentMode==='short'?10:currentMode==='long'?50:25;
  totalSecs=mins*60;leftSecs=totalSecs;
  document.getElementById('start-btn').textContent='시작';
  document.getElementById('timer-phase').textContent='집중';
  updateRing();updateTimerText();
}

function updateRing(){
  const circ=2*Math.PI*88;
  const offset=circ*(1-leftSecs/totalSecs);
  document.getElementById('ring').style.strokeDashoffset=offset;
  document.getElementById('ring').style.stroke=isBreak?'#0F6E56':'#185FA5';
}

function updateTimerText(){
  const m=Math.floor(leftSecs/60).toString().padStart(2,'0');
  const s=(leftSecs%60).toString().padStart(2,'0');
  document.getElementById('timer-text').textContent=m+':'+s;
  document.getElementById('session-count').textContent=sessionCount;
}

function sendNotif(title,body){
  if(Notification.permission==='granted')new Notification(title,{body});
}

function toggleAddForm(){
  const f=document.getElementById('add-form');
  f.style.display=f.style.display==='block'?'none':'block';
}

function buildColorRow(){
  const row=document.getElementById('color-row');row.innerHTML='';
  COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-opt'+(c===selColor?' sel':'');
    d.style.background=c;
    d.onclick=()=>{selColor=c;buildColorRow();};
    row.appendChild(d);
  });
}

function renderSubjects(){
  const list=document.getElementById('subject-list');
  const sel=document.getElementById('timer-subject-sel');
  sel.innerHTML='<option value="">과목 선택 (선택사항)</option>';
  if(subjects.length===0){list.innerHTML='<div class="empty">과목을 추가해보세요</div>';return;}
  list.innerHTML='';
  subjects.forEach((s,i)=>{
    const row=document.createElement('div');row.className='subject-row';
    row.innerHTML=`<div class="subject-dot" style="background:${s.color}"></div>
      <div class="subject-name">${s.name}</div>
      <div class="subject-time">${s.alarmTime||''}</div>
      <label class="toggle"><input type="checkbox" ${s.enabled?'checked':''} onchange="toggleAlarm(${i},this.checked)"><span class="slider"></span></label>`;
    list.appendChild(row);
    const opt=document.createElement('option');opt.value=s.name;opt.textContent=s.name;
    sel.appendChild(opt);
  });
}

function addSubject(){
  const name=document.getElementById('new-subject-name').value.trim();
  if(!name)return;
  const time=document.getElementById('new-alarm-time').value;
  subjects.push({name,color:selColor,alarmTime:time,enabled:false});
  localStorage.setItem('subjects',JSON.stringify(subjects));
  renderSubjects();
  document.getElementById('new-subject-name').value='';
  document.getElementById('add-form').style.display='none';
}

function toggleAlarm(i,enabled){
  subjects[i].enabled=enabled;
  localStorage.setItem('subjects',JSON.stringify(subjects));
  if(enabled&&Notification.permission!=='granted')Notification.requestPermission();
  if(enabled&&subjects[i].alarmTime)scheduleAlarm(subjects[i]);
}

function scheduleAlarm(s){
  const[h,m]=s.alarmTime.split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  setTimeout(()=>sendNotif(`📚 ${s.name} 공부 시간!`,`${s.name} 공부를 시작할 시간이에요.`),target-now);
}

function renderStats(){
  const today=new Date().toDateString();
  const todayRecs=records.filter(r=>new Date(r.date).toDateString()===today);
  const todayMin=Math.round(todayRecs.reduce((a,r)=>a+r.duration,0)/60);
  const totalMin=Math.round(records.reduce((a,r)=>a+r.duration,0)/60);
  document.getElementById('today-min').textContent=todayMin;
  document.getElementById('today-sess').textContent=todayRecs.length;
  document.getElementById('total-min').textContent=totalMin;
  document.getElementById('total-sess').textContent=records.length;
  const bySubject={};
  records.forEach(r=>{bySubject[r.subjectName]=(bySubject[r.subjectName]||0)+r.duration;});
  const bars=document.getElementById('subject-bars');
  const entries=Object.entries(bySubject).sort((a,b)=>b[1]-a[1]);
  if(entries.length===0){bars.innerHTML='<div class="empty">아직 기록이 없어요</div>';}
  else{
    const max=entries[0][1];
    bars.innerHTML=entries.map(([name,dur])=>{
      const min=Math.round(dur/60),pct=Math.round(dur/max*100);
      const subj=subjects.find(s=>s.name===name);
      const color=subj?subj.color:'#185FA5';
      return `<div class="bar-row"><div class="bar-label">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-val">${min}분</div></div>`;
    }).join('');
  }
  const recList=document.getElementById('records-list');
  const recent=[...records].reverse().slice(0,8);
  if(recent.length===0){recList.innerHTML='<div class="empty">아직 기록이 없어요</div>';}
  else{
    recList.innerHTML=recent.map(r=>{
      const min=Math.round(r.duration/60);
      const subj=subjects.find(s=>s.name===r.subjectName);
      const color=subj?subj.color:'#185FA5';
      const date=new Date(r.date);
      const label=`${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;
      return `<div class="record-row"><div class="record-dot" style="background:${color}"></div><div class="record-name">${r.subjectName}</div><div class="record-dur">${min}분 · ${label}</div></div>`;
    }).join('');
  }
}

buildColorRow();renderSubjects();updateRing();updateTimerText();
</script>
</body>
</html>
